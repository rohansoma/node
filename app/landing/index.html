<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f7fafc;
      color: #1e293b;
      position: relative;
    }

    /* Animated gradient background */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(circle at 22% 24%, rgba(34, 193, 195, 0.32), transparent 28%),
        radial-gradient(circle at 76% 30%, rgba(203, 213, 225, 0.58), transparent 30%),
        radial-gradient(circle at 70% 74%, rgba(148, 163, 184, 0.24), transparent 28%);
      animation: moveBg 14s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes moveBg {
      0% { transform: translate(0,0); }
      50% { transform: translate(-10%, -10%); }
      100% { transform: translate(0,0); }
    }

    .container {
      text-align: center;
      z-index: 1;
    }

    .logo {
      width: 220px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      color: #475569;
      margin-bottom: 40px;
    }

    .download-btn {
      padding: 14px 32px;
      font-size: 1rem;
      border-radius: 999px;
      border: none;
      background: #1e293b;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 12px 30px rgba(30, 41, 59, 0.14);
    }

    .download-btn:hover {
      transform: scale(1.05);
      background: #172033;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/node.png" alt="Node Logo" class="logo">
    <h1>Control your computer effortlessly</h1>
    <p>Accessible, fast, and powered by intelligent input.</p>
    <button class="download-btn">Download</button>
  </div>

</body>
</html>
